services:
  # ──────────────────────────────────────────────────────────────────
  # TVC Backend Services (using Supabase Postgres + Upstash Redis)
  # ──────────────────────────────────────────────────────────────────

  api:
    build:
      context: ./tvc-go
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - TVC_STORAGE_POSTGRES_URL=${TVC_STORAGE_POSTGRES_URL}
      - TVC_STORAGE_REDIS_URL=${TVC_STORAGE_REDIS_URL}
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/v1/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tvc-network
    restart: unless-stopped

  proxy:
    build:
      context: ./tvc-go
      dockerfile: Dockerfile.proxy
    ports:
      - "8081:8080"
    environment:
      - TVC_STORAGE_POSTGRES_URL=${TVC_STORAGE_POSTGRES_URL}
      - TVC_STORAGE_REDIS_URL=${TVC_STORAGE_REDIS_URL}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - ./tvc-go/configs/proxy.example.yaml:/app/configs/proxy.yaml:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tvc-network
    restart: unless-stopped

  replayer:
    build:
      context: ./tvc-go
      dockerfile: Dockerfile.replayer
    environment:
      - TVC_STORAGE_POSTGRES_URL=${TVC_STORAGE_POSTGRES_URL}
      - TVC_STORAGE_REDIS_URL=${TVC_STORAGE_REDIS_URL}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - ./tvc-go/configs/replayer.example.yaml:/app/configs/replayer.yaml:ro
    networks:
      - tvc-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────
  # TVC Frontend
  # ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./tvc-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
    depends_on:
      - api
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => { process.exit(r.statusCode < 500 ? 0 : 1) })",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tvc-network
    restart: unless-stopped

networks:
  tvc-network:
    driver: bridge
