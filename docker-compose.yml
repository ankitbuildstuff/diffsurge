services:
  # ──────────────────────────────────────────────────────────────────
  # Infrastructure Services
  # ──────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tvc_dev
      POSTGRES_USER: tvc
      POSTGRES_PASSWORD: tvc_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tvc-frontend/supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tvc -d tvc_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tvc-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tvc-network

  # ──────────────────────────────────────────────────────────────────
  # TVC Backend Services
  # ──────────────────────────────────────────────────────────────────

  api:
    build:
      context: ./tvc-go
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - TVC_STORAGE_POSTGRES_URL=postgres://tvc:tvc_dev_pass@postgres:5432/tvc_dev?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
      - LOG_FORMAT=json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/v1/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tvc-network
    restart: unless-stopped

  proxy:
    build:
      context: ./tvc-go
      dockerfile: Dockerfile.proxy
    ports:
      - "8081:8080"
    environment:
      - TVC_STORAGE_POSTGRES_URL=postgres://tvc:tvc_dev_pass@postgres:5432/tvc_dev?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
      - LOG_FORMAT=json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./tvc-go/configs/proxy.example.yaml:/app/configs/proxy.yaml:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tvc-network
    restart: unless-stopped

  replayer:
    build:
      context: ./tvc-go
      dockerfile: Dockerfile.replayer
    environment:
      - TVC_STORAGE_POSTGRES_URL=postgres://tvc:tvc_dev_pass@postgres:5432/tvc_dev?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
      - LOG_FORMAT=json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./tvc-go/configs/replayer.example.yaml:/app/configs/replayer.yaml:ro
    networks:
      - tvc-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────
  # TVC Frontend
  # ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./tvc-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_SUPABASE_URL=your-supabase-url
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=your-supabase-anon-key
      - SUPABASE_SERVICE_ROLE_KEY=your-service-role-key
    depends_on:
      - api
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => { process.exit(r.statusCode < 500 ? 0 : 1) })",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tvc-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  tvc-network:
    driver: bridge
