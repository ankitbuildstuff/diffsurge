services:
  # ──────────────────────────────────────────────────────────────────
  # Diffsurge Backend Services (using Supabase Postgres + Upstash Redis)
  # ──────────────────────────────────────────────────────────────────

  api:
    build:
      context: ./diffsurge-go
      dockerfile: Dockerfile
      args:
        SERVICE: api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DIFFSURGE_STORAGE_POSTGRES_URL=${DIFFSURGE_STORAGE_POSTGRES_URL}
      - DIFFSURGE_STORAGE_REDIS_URL=${DIFFSURGE_STORAGE_REDIS_URL}
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    healthcheck:
      test: ["CMD", "/app/diffsurge", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - diffsurge-network
    restart: unless-stopped

  proxy:
    build:
      context: ./diffsurge-go
      dockerfile: Dockerfile
      args:
        SERVICE: proxy
    ports:
      - "8081:8080"
    environment:
      - DIFFSURGE_STORAGE_POSTGRES_URL=${DIFFSURGE_STORAGE_POSTGRES_URL}
      - DIFFSURGE_STORAGE_REDIS_URL=${DIFFSURGE_STORAGE_REDIS_URL}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - ./diffsurge-go/configs/proxy.example.yaml:/app/configs/proxy.yaml:ro
    healthcheck:
      test: ["CMD", "/app/diffsurge", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - diffsurge-network
    restart: unless-stopped

  replayer:
    build:
      context: ./diffsurge-go
      dockerfile: Dockerfile
      args:
        SERVICE: replayer
    environment:
      - DIFFSURGE_STORAGE_POSTGRES_URL=${DIFFSURGE_STORAGE_POSTGRES_URL}
      - DIFFSURGE_STORAGE_REDIS_URL=${DIFFSURGE_STORAGE_REDIS_URL}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - ./diffsurge-go/configs/replayer.example.yaml:/app/configs/replayer.yaml:ro
    networks:
      - diffsurge-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────
  # Diffsurge Frontend
  # ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./diffsurge-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
    depends_on:
      - api
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => { process.exit(r.statusCode < 500 ? 0 : 1) })",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - diffsurge-network
    restart: unless-stopped

networks:
  diffsurge-network:
    driver: bridge
