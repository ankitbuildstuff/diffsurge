name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build CLI binary
        working-directory: tvc-go
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build \
            -ldflags="-w -s -X github.com/tvc-org/tvc/internal/config.Version=${{ github.ref_name }}" \
            -o surge-${{ matrix.suffix }} \
            ./cmd/cli/main.go

      - uses: actions/upload-artifact@v4
        with:
          name: surge-${{ matrix.suffix }}
          path: tvc-go/surge-${{ matrix.suffix }}

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: binaries/*

  npm-publish:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Package binaries for npm
        run: |
          mkdir -p surge-cli-npm/binaries
          for f in binaries/surge-*; do
            echo "Compressing $(basename $f)..."
            gzip -c "$f" > "surge-cli-npm/binaries/$(basename $f).gz"
          done
          ls -la surge-cli-npm/binaries/

      - name: Update version from tag
        working-directory: surge-cli-npm
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: surge-cli-npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
