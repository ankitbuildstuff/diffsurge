name: Go CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'tvc-go/**'
      - '.github/workflows/go.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'tvc-go/**'
      - '.github/workflows/go.yml'

defaults:
  run:
    working-directory: tvc-go

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: tvc-go/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: tvc-go

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: tvc-go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 30" | bc -l) )); then
            echo "Coverage below 30%, failing"
            exit 1
          fi

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          file: tvc-go/coverage.out
          flags: go
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: tvc-go/go.sum

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-X github.com/tvc-org/tvc/internal/config.Version=${{ github.sha }}" \
            -o bin/tvc-${GOOS}-${GOARCH}${EXT} ./cmd/cli

      - name: Build Proxy
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-X github.com/tvc-org/tvc/internal/config.Version=${{ github.sha }}" \
            -o bin/tvc-proxy-${GOOS}-${GOARCH}${EXT} ./cmd/proxy

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tvc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tvc-go/bin/

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: tvc-go/go.sum

      - name: Go vet
        run: go vet ./...
